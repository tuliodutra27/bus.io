services:
  db:
    image: mysql:8.0
    container_name: busio_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-busio}
      MYSQL_USER: ${MYSQL_USER:-busio}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-busio}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: busio_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-busio}:${MYSQL_PASSWORD:-busio}@db:3306/${MYSQL_DATABASE:-busio}
      SEED_ON_START: "true"
      # Active Directory — ajuste conforme seu ambiente
      LDAP_SERVER: ${LDAP_SERVER:-ldap://dc.aliseo.local}
      LDAP_DOMAIN: ${LDAP_DOMAIN:-aliseo.local}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=aliseo,DC=local}
      LDAP_GROUP: ${LDAP_GROUP:-GRP_App_Acessar_Bus.io}
      # Troque por um valor aleatório longo em produção
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-troque-em-producao}
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:
