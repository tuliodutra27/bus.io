services:
  db:
    image: mysql:8.0
    container_name: busio_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: busio_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Banco — lido diretamente do .env, sem defaults hardcoded
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_HOST: db
      SEED_ON_START: ${SEED_ON_START:-true}
      # Active Directory
      LDAP_SERVER: ${LDAP_SERVER}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_GROUP_ADMIN: ${LDAP_GROUP_ADMIN}
      LDAP_GROUP_LOGISTICA: ${LDAP_GROUP_LOGISTICA}
      LDAP_GROUP_VIEWER: ${LDAP_GROUP_VIEWER}
      # Sessão
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:
